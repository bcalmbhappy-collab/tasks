<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1D9E75">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="My Tasks">
<meta name="mobile-web-app-capable" content="yes">
<title>My Tasks</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='112' fill='%231D9E75'/%3E%3Crect x='140' y='155' width='232' height='36' rx='18' fill='white' opacity='.3'/%3E%3Crect x='140' y='238' width='232' height='36' rx='18' fill='white' opacity='.3'/%3E%3Crect x='140' y='321' width='160' height='36' rx='18' fill='white' opacity='.3'/%3E%3Ccircle cx='108' cy='173' r='22' fill='white'/%3E%3Ccircle cx='108' cy='256' r='22' fill='white'/%3E%3Cpath d='M96 321 l12 14 l24-28' stroke='white' stroke-width='7' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3C/svg%3E">
<style>
:root{
  --bg:#F7F6F3;--surface:#FFFFFF;--border:#E8E5DF;--text:#1A1917;--muted:#8C8984;
  --accent:#1D9E75;--accent-light:#E1F5EE;--danger:#E24B4A;
  --radius:14px;--radius-sm:8px;--tab-h:56px;--header-h:60px;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1A1917;--surface:#242320;--border:#333230;--text:#F0EDE8;--muted:#6B6966;--accent-light:#0A3D2B;}
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;color:var(--text);overscroll-behavior:none}
body{display:flex;flex-direction:column;max-width:430px;margin:0 auto;min-height:100dvh}

/* Install banner */
#install-banner{display:none;align-items:center;gap:12px;background:var(--accent);color:#fff;padding:12px 16px}
#install-banner.show{display:flex}
.ib-icon{width:36px;height:36px;background:rgba(255,255,255,0.2);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ib-text{flex:1;line-height:1.3}
.ib-text strong{display:block;font-size:14px;font-weight:600}
.ib-text span{font-size:12px;opacity:0.85}
.ib-btn{background:white;color:var(--accent);border:none;padding:8px 14px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0}
.ib-close{background:transparent;border:none;color:white;font-size:22px;cursor:pointer;padding:0 2px;flex-shrink:0;line-height:1}

/* iOS tip */
#ios-tip{display:none;background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px;font-size:13px;color:var(--muted);text-align:center;line-height:1.6}
#ios-tip.show{display:block}
#ios-tip strong{color:var(--text)}
.tip-close{display:inline-block;margin-top:8px;color:var(--accent);font-size:13px;cursor:pointer;font-weight:500}

.header{height:var(--header-h);display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
.header-title{font-size:17px;font-weight:600;letter-spacing:-0.3px}
.header-date{font-size:13px;color:var(--muted);margin-top:1px}
.today-pill{background:var(--accent);color:#fff;font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px}

.tab-bar{display:flex;background:var(--surface);border-top:1px solid var(--border);position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;z-index:10;height:var(--tab-h);padding-bottom:env(safe-area-inset-bottom)}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:transparent;cursor:pointer;color:var(--muted);font-size:10px;font-weight:500;letter-spacing:0.3px;padding:8px 0}
.tab-btn svg{width:22px;height:22px;stroke-width:1.8}
.tab-btn.active{color:var(--accent)}
.tab-btn.active svg{stroke-width:2.2}

.scroll-area{flex:1;overflow-y:auto;padding:0 0 calc(var(--tab-h) + 80px);-webkit-overflow-scrolling:touch}

.day-nav{display:flex;align-items:center;background:var(--surface);border-bottom:1px solid var(--border)}
.day-nav-arrow{width:52px;height:48px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;cursor:pointer;color:var(--muted);font-size:20px}
.day-nav-arrow:active{background:var(--bg)}
.day-nav-center{flex:1;text-align:center;padding:10px 0}
.day-nav-name{font-size:15px;font-weight:600;letter-spacing:-0.2px}
.day-nav-date{font-size:12px;color:var(--muted);margin-top:1px}

.progress-section{padding:14px 20px 10px;background:var(--surface);border-bottom:1px solid var(--border)}
.progress-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.progress-label{font-size:13px;color:var(--muted)}
.progress-pct{font-size:13px;font-weight:600;color:var(--accent)}
.progress-track{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width 0.35s ease}

.task-section{padding:12px 16px;display:flex;flex-direction:column;gap:8px}
.task-card{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;transition:opacity 0.2s}
.task-card.done{opacity:0.55}
.task-card.done .task-text{text-decoration:line-through;color:var(--muted)}
.check-circle{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s;background:transparent}
.task-body{flex:1;min-width:0}
.task-text{font-size:15px;line-height:1.4;word-break:break-word}
.task-cat-btn{font-size:11px;margin-top:3px;font-weight:500;border:none;background:transparent;cursor:pointer;padding:0;text-align:left;text-decoration:underline;text-underline-offset:2px;text-decoration-style:dotted}
.del-circle{width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:16px;flex-shrink:0}
.del-circle:active{background:var(--bg);color:var(--danger)}
.empty-state{padding:48px 20px;text-align:center;color:var(--muted);font-size:15px}
.empty-icon{font-size:36px;margin-bottom:12px;opacity:0.4}

.fab-wrap{position:fixed;bottom:calc(var(--tab-h) + 16px);right:20px;z-index:20}
.fab{width:54px;height:54px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(29,158,117,0.35);transition:transform 0.15s}
.fab:active{transform:scale(0.93)}
.fab svg{width:24px;height:24px;stroke:#fff;stroke-width:2.5;fill:none}

.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:30;opacity:0;pointer-events:none;transition:opacity 0.25s}
.sheet-overlay.open{opacity:1;pointer-events:all}
.sheet{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:430px;background:var(--surface);border-radius:20px 20px 0 0;z-index:31;padding:0 0 calc(env(safe-area-inset-bottom)+20px);transition:transform 0.3s cubic-bezier(0.32,0.72,0,1)}
.sheet.open{transform:translateX(-50%) translateY(0)}
.sheet-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 16px}
.sheet-title{font-size:16px;font-weight:600;padding:0 20px 14px;border-bottom:1px solid var(--border)}
.sheet-body{padding:16px 20px;display:flex;flex-direction:column;gap:12px}
.sheet-input{width:100%;padding:13px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-size:16px;outline:none;font-family:inherit}
.sheet-input:focus{border-color:var(--accent)}
.cat-chips{display:flex;gap:8px;flex-wrap:wrap}
.cat-chip{padding:7px 14px;border-radius:20px;border:1.5px solid var(--border);background:transparent;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted)}
.cat-chip.selected{border-width:2px}
.primary-btn{width:100%;padding:15px;border-radius:var(--radius-sm);border:none;background:var(--accent);color:#fff;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit}
.primary-btn:active{opacity:0.85}

.week-nav{display:flex;align-items:center;background:var(--surface);border-bottom:1px solid var(--border)}
.week-nav-arrow{width:52px;height:48px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;cursor:pointer;color:var(--muted);font-size:20px}
.week-nav-center{flex:1;text-align:center;font-size:14px;font-weight:600;color:var(--text)}
.week-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:14px 16px;background:var(--bg)}
.wstat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;text-align:center}
.wstat-num{font-size:22px;font-weight:700;letter-spacing:-0.5px}
.wstat-lbl{font-size:11px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:0.3px}
.week-progress{padding:0 16px 14px;background:var(--bg)}
.week-progress-row{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px}
.week-progress-row span:last-child{color:var(--accent);font-weight:600}
.day-rows{display:flex;flex-direction:column;gap:8px;padding:0 16px 16px}
.day-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.day-row-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--border)}
.day-row-header.today-row{background:var(--accent-light)}
.day-row-name{font-size:14px;font-weight:600}
.day-row-date{font-size:12px;color:var(--muted)}
.day-row-go{font-size:12px;color:var(--accent);font-weight:500;border:none;background:transparent;cursor:pointer;padding:4px 8px;border-radius:6px}
.day-chips{padding:10px 14px;display:flex;flex-wrap:wrap;gap:6px;min-height:40px;align-items:center}
.day-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:500}
.day-chip.done-chip{opacity:0.4}
.no-tasks-row{font-size:13px;color:var(--muted);font-style:italic}

.edit-cat-chip{padding:10px 16px;border-radius:20px;border:1.5px solid var(--border);background:transparent;cursor:pointer;font-size:14px;font-weight:500;color:var(--muted);text-align:left;width:100%;display:flex;align-items:center;gap:10px}
.edit-cat-chip.selected{border-width:2px}
.edit-cat-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
</style>
</head>
<body>

<div id="install-banner">
  <div class="ib-icon">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
  </div>
  <div class="ib-text"><strong>Add to Home Screen</strong><span>Open instantly like an app</span></div>
  <button class="ib-btn" id="install-btn">Install</button>
  <button class="ib-close" id="install-close">×</button>
</div>

<div id="ios-tip">
  <strong>Add to your home screen</strong><br>
  Tap the <strong>Share ↑</strong> button in Safari, then <strong>"Add to Home Screen"</strong>
  <br><span class="tip-close" onclick="document.getElementById('ios-tip').classList.remove('show')">Got it ✓</span>
</div>

<div class="header">
  <div>
    <div class="header-title" id="header-title">My Tasks</div>
    <div class="header-date" id="header-date"></div>
  </div>
  <div id="header-right"></div>
</div>

<div class="scroll-area" id="scroll-area"></div>

<div class="fab-wrap" id="fab-wrap">
  <button class="fab" id="fab-btn">
    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>
</div>

<div class="sheet-overlay" id="overlay" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">New task</div>
  <div class="sheet-body">
    <input class="sheet-input" id="sheet-input" placeholder="What needs to get done?" autocomplete="off">
    <div class="cat-chips" id="cat-chips"></div>
    <button class="primary-btn" onclick="doAdd()">Add task</button>
  </div>
</div>

<div class="sheet-overlay" id="edit-overlay" onclick="closeEditSheet()"></div>
<div class="sheet" id="edit-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">Edit task</div>
  <div class="sheet-body">
    <input class="sheet-input" id="edit-input" placeholder="Task name">
    <div style="font-size:12px;color:var(--muted);font-weight:500;letter-spacing:0.3px;text-transform:uppercase">Category</div>
    <div id="edit-cat-list" style="display:flex;flex-direction:column;gap:8px"></div>
    <button class="primary-btn" onclick="doSaveEdit()">Save changes</button>
  </div>
</div>

<nav class="tab-bar">
  <button class="tab-btn active" id="tab-daily" onclick="setView('daily')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    Daily
  </button>
  <button class="tab-btn" id="tab-weekly" onclick="setView('weekly')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="10" x2="9" y2="22"/><line x1="15" y1="10" x2="15" y2="22"/></svg>
    Weekly
  </button>
</nav>

<script>
// ── PWA service worker (blob trick — works from file:// and any origin) ────────
const SW=`const C='mt-v1';self.addEventListener('install',e=>e.waitUntil(caches.open(C).then(c=>c.add('/'))));self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));`;
if('serviceWorker' in navigator){
  try{
    const b=new Blob([SW],{type:'application/javascript'});
    navigator.serviceWorker.register(URL.createObjectURL(b));
  }catch(e){}
}

// ── Install prompt ─────────────────────────────────────────────────────────────
const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
const isStandalone=window.matchMedia('(display-mode:standalone)').matches||navigator.standalone;
let deferredPrompt=null;

if(!isStandalone){
  if(isIOS){
    setTimeout(()=>document.getElementById('ios-tip').classList.add('show'),1200);
  } else {
    window.addEventListener('beforeinstallprompt',e=>{
      e.preventDefault();
      deferredPrompt=e;
      document.getElementById('install-banner').classList.add('show');
    });
  }
}
document.getElementById('install-btn').addEventListener('click',async()=>{
  if(!deferredPrompt)return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt=null;
  document.getElementById('install-banner').classList.remove('show');
});
document.getElementById('install-close').addEventListener('click',()=>document.getElementById('install-banner').classList.remove('show'));

// ── Data ───────────────────────────────────────────────────────────────────────
const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const SHORT=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const CATS=[
  {id:'work',label:'Work',color:'#378ADD',bg:'#ddeefa'},
  {id:'health',label:'Health',color:'#1D9E75',bg:'#d6f0e7'},
  {id:'personal',label:'Personal',color:'#7F77DD',bg:'#eae8fb'},
  {id:'family',label:'Family',color:'#D4537E',bg:'#f9dde7'},
];
const CM=Object.fromEntries(CATS.map(c=>[c.id,c]));
let view='daily',dayOff=0,weekOff=0,selCat='work';
let tasks={};
try{tasks=JSON.parse(localStorage.getItem('tdtasks2')||'{}')||{};}catch(e){}
function save(){try{localStorage.setItem('tdtasks2',JSON.stringify(tasks));}catch(e){}}
function dateKey(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function todayKey(){return dateKey(new Date());}
function getDay(off){const d=new Date();d.setDate(d.getDate()+off);return d;}
function getWeekDates(off){const t=new Date(),mon=new Date(t);mon.setDate(t.getDate()-t.getDay()+1+off*7);return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});}
function tasksFor(k){if(!tasks[k])tasks[k]=[];return tasks[k];}
function fmtDate(d){return SHORT[d.getDay()]+', '+MONTHS[d.getMonth()]+' '+d.getDate();}
function fmtShort(d){return MONTHS[d.getMonth()]+' '+d.getDate();}

// ── Add sheet ─────────────────────────────────────────────────────────────────
function openSheet(){buildCatChips();document.getElementById('overlay').classList.add('open');document.getElementById('sheet').classList.add('open');setTimeout(()=>document.getElementById('sheet-input').focus(),300);}
function closeSheet(){document.getElementById('overlay').classList.remove('open');document.getElementById('sheet').classList.remove('open');}
function buildCatChips(){
  document.getElementById('cat-chips').innerHTML=CATS.map(c=>`<button class="cat-chip${selCat===c.id?' selected':''}" style="${selCat===c.id?`background:${c.bg};border-color:${c.color};color:${c.color}`:''}" onclick="selCat='${c.id}';buildCatChips()">${c.label}</button>`).join('');
}
function doAdd(){
  const inp=document.getElementById('sheet-input'),text=inp.value.trim();
  if(!text)return;
  tasksFor(dateKey(getDay(dayOff))).push({id:Date.now(),text,cat:selCat,done:false});
  save();inp.value='';closeSheet();render();
}

// ── Edit sheet ────────────────────────────────────────────────────────────────
let editKey=null,editId=null,editSelCat='work';
function openEditSheet(k,id){
  editKey=k;editId=id;
  const t=tasksFor(k).find(t=>t.id===id);if(!t)return;
  editSelCat=t.cat;
  document.getElementById('edit-input').value=t.text;
  buildEditCatList();
  document.getElementById('edit-overlay').classList.add('open');
  document.getElementById('edit-sheet').classList.add('open');
  setTimeout(()=>document.getElementById('edit-input').focus(),300);
}
function closeEditSheet(){document.getElementById('edit-overlay').classList.remove('open');document.getElementById('edit-sheet').classList.remove('open');}
function buildEditCatList(){
  document.getElementById('edit-cat-list').innerHTML=CATS.map(c=>`<button class="edit-cat-chip${editSelCat===c.id?' selected':''}" style="${editSelCat===c.id?`background:${c.bg};border-color:${c.color};color:${c.color}`:'color:var(--muted)'}" onclick="editSelCat='${c.id}';buildEditCatList()"><span class="edit-cat-dot" style="background:${c.color}"></span>${c.label}</button>`).join('');
}
function doSaveEdit(){
  const text=document.getElementById('edit-input').value.trim();if(!text)return;
  const t=tasksFor(editKey).find(t=>t.id===editId);
  if(t){t.text=text;t.cat=editSelCat;}
  save();closeEditSheet();render();
}

// ── Actions ───────────────────────────────────────────────────────────────────
function toggle(k,id){const t=tasksFor(k).find(t=>t.id===id);if(t)t.done=!t.done;save();render();}
function del(k,id){tasks[k]=tasksFor(k).filter(t=>t.id!==id);save();render();}
function goDay(dk){const today=new Date(todayKey()+'T12:00:00'),target=new Date(dk+'T12:00:00');dayOff=Math.round((target-today)/86400000);view='daily';render();}
function setView(v){
  view=v;
  document.getElementById('tab-daily').classList.toggle('active',v==='daily');
  document.getElementById('tab-weekly').classList.toggle('active',v==='weekly');
  document.getElementById('fab-wrap').style.display=v==='daily'?'':'none';
  render();
}
function weekStats(){let total=0,done=0;getWeekDates(weekOff).forEach(d=>{const ts=tasksFor(dateKey(d));total+=ts.length;done+=ts.filter(t=>t.done).length;});return{total,done,pct:total?Math.round(done/total*100):0};}

// ── Render ────────────────────────────────────────────────────────────────────
function render(){
  const sa=document.getElementById('scroll-area');
  if(view==='daily'){
    const d=getDay(dayOff),k=dateKey(d),isToday=k===todayKey();
    const tlist=tasksFor(k),done=tlist.filter(t=>t.done).length,pct=tlist.length?Math.round(done/tlist.length*100):0;
    document.getElementById('header-title').textContent=isToday?'Today':DAYS[d.getDay()];
    document.getElementById('header-date').textContent=fmtDate(d);
    document.getElementById('header-right').innerHTML=isToday?'<span class="today-pill">Today</span>':'';
    sa.innerHTML=`
      <div class="day-nav">
        <button class="day-nav-arrow" onclick="dayOff--;render()">‹</button>
        <div class="day-nav-center"><div class="day-nav-name">${DAYS[d.getDay()]}</div><div class="day-nav-date">${fmtDate(d)}</div></div>
        <button class="day-nav-arrow" onclick="dayOff++;render()">›</button>
      </div>
      <div class="progress-section">
        <div class="progress-row"><span class="progress-label">${done} of ${tlist.length} completed</span><span class="progress-pct">${pct}%</span></div>
        <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="task-section">
        ${tlist.length===0
          ?`<div class="empty-state"><div class="empty-icon">✓</div><div>No tasks for this day</div><div style="font-size:13px;margin-top:6px">Tap + to add one</div></div>`
          :tlist.map(t=>{const cat=CM[t.cat]||CATS[0];return`
            <div class="task-card${t.done?' done':''}">
              <div class="check-circle" onclick="toggle('${k}',${t.id})" style="${t.done?`border-color:${cat.color};background:${cat.color}`:''}">
                ${t.done?`<svg width="12" height="9" viewBox="0 0 12 9" fill="none"><path d="M1 4.5L4.5 8L11 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`:''}
              </div>
              <div class="task-body">
                <div class="task-text">${t.text}</div>
                <button class="task-cat-btn" style="color:${cat.color}" onclick="openEditSheet('${k}',${t.id})">${cat.label} · edit</button>
              </div>
              <button class="del-circle" onclick="del('${k}',${t.id})">×</button>
            </div>`;}).join('')}
      </div>`;
  } else {
    const dates=getWeekDates(weekOff),{total,done,pct}=weekStats();
    document.getElementById('header-title').textContent='This Week';
    document.getElementById('header-date').textContent=fmtShort(dates[0])+' – '+fmtShort(dates[6]);
    document.getElementById('header-right').innerHTML='';
    sa.innerHTML=`
      <div class="week-nav">
        <button class="week-nav-arrow" onclick="weekOff--;render()">‹</button>
        <div class="week-nav-center">${fmtShort(dates[0])} – ${fmtShort(dates[6])}</div>
        <button class="week-nav-arrow" onclick="weekOff++;render()">›</button>
      </div>
      <div class="week-stats">
        <div class="wstat"><div class="wstat-num">${total}</div><div class="wstat-lbl">Total</div></div>
        <div class="wstat"><div class="wstat-num">${done}</div><div class="wstat-lbl">Done</div></div>
        <div class="wstat"><div class="wstat-num" style="color:var(--accent)">${pct}%</div><div class="wstat-lbl">Rate</div></div>
      </div>
      <div class="week-progress">
        <div class="week-progress-row"><span>Weekly completion</span><span>${pct}%</span></div>
        <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="day-rows">
        ${dates.map(date=>{
          const dk=dateKey(date),ts=tasksFor(dk),isTd=dk===todayKey(),ddone=ts.filter(t=>t.done).length;
          return`<div class="day-row">
            <div class="day-row-header${isTd?' today-row':''}">
              <div><div class="day-row-name" style="${isTd?'color:var(--accent)':''}">${DAYS[date.getDay()]}${isTd?' · Today':''}</div><div class="day-row-date">${fmtShort(date)}</div></div>
              <div style="display:flex;align-items:center;gap:8px"><span style="font-size:12px;color:var(--muted)">${ddone}/${ts.length}</span><button class="day-row-go" onclick="goDay('${dk}')">+ Add</button></div>
            </div>
            <div class="day-chips">
              ${ts.length===0?'<span class="no-tasks-row">No tasks</span>':ts.map(t=>{const cat=CM[t.cat]||CATS[0];return`<span class="day-chip${t.done?' done-chip':''}" style="background:${cat.bg};color:${cat.color}">${t.text}</span>`;}).join('')}
            </div>
          </div>`;
        }).join('')}
      </div>`;
  }
}

document.getElementById('sheet-input').addEventListener('keydown',e=>{if(e.key==='Enter')doAdd();});
document.getElementById('edit-input').addEventListener('keydown',e=>{if(e.key==='Enter')doSaveEdit();});
document.getElementById('fab-btn').addEventListener('click',openSheet);
render();
</script>
</body>
</html>
